<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password | Eden Recyclers</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#006c03',
            surface: '#f8fbf6',
            'on-surface': '#181c1e',
            'on-surface-variant': '#5d665b',
            outline: '#74796f',
            'outline-variant': '#c4c8be'
          }
        }
      }
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js?v=20260612-audit1"></script>
  <script src="js/supabase-client.js?v=20260612-audit1"></script>
</head>
<body class="min-h-screen bg-surface text-on-surface grid place-items-center p-6">
  <main class="w-full max-w-md bg-white border border-outline-variant rounded-2xl shadow-xl p-6">
    <div class="mb-6 text-center">
      <img src="assets/eden-recyclers-logo.jpg" alt="Eden Recyclers" class="mx-auto h-16 object-contain mb-4">
      <h1 class="text-2xl font-bold">Reset Password</h1>
      <p class="text-sm text-on-surface-variant mt-2">Enter a new password for your Eden Recyclers account.</p>
    </div>

    <div id="reset-message" class="hidden mb-4 rounded-xl px-4 py-3 text-sm"></div>

    <form id="reset-form" class="space-y-4">
      <label class="block">
        <span class="block text-xs font-bold uppercase text-on-surface-variant mb-1">New Password</span>
        <div class="relative">
          <input id="new-password" type="password" minlength="8" required class="w-full rounded-xl border border-outline-variant px-4 py-3 pr-12 outline-none focus:border-primary" autocomplete="new-password">
          <button type="button" id="toggle-password" class="absolute inset-y-0 right-2 px-2 text-on-surface-variant" aria-label="Show password">show</button>
        </div>
      </label>
      <div class="h-2 rounded-full bg-gray-100 overflow-hidden">
        <div id="strength-bar" class="h-full w-0 bg-red-500 transition-all"></div>
      </div>
      <p id="strength-text" class="text-xs text-on-surface-variant">Use at least 8 characters with uppercase, number, and symbol.</p>
      <button type="submit" class="w-full rounded-xl bg-primary text-white font-bold py-3 hover:opacity-90">Update Password</button>
    </form>

    <a href="login.html" class="block text-center mt-5 text-sm font-bold text-primary">Back to login</a>
  </main>

  <script>
    const form = document.getElementById('reset-form');
    const passwordInput = document.getElementById('new-password');
    const message = document.getElementById('reset-message');
    const toggle = document.getElementById('toggle-password');
    const strengthBar = document.getElementById('strength-bar');
    const strengthText = document.getElementById('strength-text');

    function showMessage(text, type = 'info') {
      message.textContent = text;
      message.className = `mb-4 rounded-xl px-4 py-3 text-sm ${type === 'error' ? 'bg-red-50 text-red-700' : 'bg-green-50 text-green-700'}`;
    }

    function scorePassword(value) {
      return [value.length >= 8, /[A-Z]/.test(value), /\d/.test(value), /[^A-Za-z0-9]/.test(value)]
        .filter(Boolean).length;
    }

    passwordInput.addEventListener('input', () => {
      const score = scorePassword(passwordInput.value);
      strengthBar.style.width = `${score * 25}%`;
      strengthBar.className = `h-full transition-all ${score < 2 ? 'bg-red-500' : score < 4 ? 'bg-yellow-500' : 'bg-green-600'}`;
      strengthText.textContent = score < 4 ? 'Add uppercase, number, and symbol for a stronger password.' : 'Strong password.';
    });

    toggle.addEventListener('click', () => {
      const visible = passwordInput.type === 'text';
      passwordInput.type = visible ? 'password' : 'text';
      toggle.textContent = visible ? 'show' : 'hide';
      toggle.setAttribute('aria-label', visible ? 'Show password' : 'Hide password');
    });

    async function hydrateSessionFromHash() {
      if (!window.supabaseClient) return;
      const params = new URLSearchParams(window.location.hash.replace(/^#/, ''));
      const accessToken = params.get('access_token');
      const refreshToken = params.get('refresh_token');
      if (accessToken && refreshToken) {
        await window.supabaseClient.auth.setSession({ access_token: accessToken, refresh_token: refreshToken });
        history.replaceState(null, document.title, window.location.pathname);
      }
    }

    hydrateSessionFromHash().catch(() => showMessage('Reset link could not be verified. Please request a new link.', 'error'));

    form.addEventListener('submit', async event => {
      event.preventDefault();
      if (!window.supabaseClient) {
        showMessage('Supabase is not configured for this deployment.', 'error');
        return;
      }
      if (scorePassword(passwordInput.value) < 2) {
        showMessage('Please choose a stronger password.', 'error');
        return;
      }
      const { error } = await window.supabaseClient.auth.updateUser({ password: passwordInput.value });
      if (error) {
        showMessage('Password update failed. Please request a new reset link.', 'error');
        return;
      }
      showMessage('Password updated. You can now sign in.');
      setTimeout(() => { window.location.href = 'login.html'; }, 1200);
    });
  </script>
</body>
</html>
