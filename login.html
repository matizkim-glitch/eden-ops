<!DOCTYPE html>
<html class="light" lang="en">
<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <title>Eden Recyclers | Sign In</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#006c03',
            'on-primary': '#ffffff',
            background: '#f7fafc',
            surface: '#f7fafc',
            'on-surface': '#181c1e',
            'on-surface-variant': '#3f4a3b',
            'outline-variant': '#becab6',
            error: '#ba1a1a'
          }
        }
      }
    };
  </script>
  <style>body{font-family:Inter,sans-serif}</style>
</head>
<body class="bg-background text-on-surface min-h-screen flex items-center justify-center px-4">
  <div class="w-full max-w-md bg-white rounded-2xl border border-outline-variant shadow-lg overflow-hidden">
    <div class="bg-primary text-white text-center py-8 px-6">
      <div class="mx-auto mb-4 h-12 w-12 rounded-xl bg-white/10 flex items-center justify-center border border-white/20">
        <span class="material-symbols-outlined text-4xl" style="font-variation-settings:'FILL' 1;">recycling</span>
      </div>
      <h1 class="text-2xl font-bold">Eden Recyclers BOS</h1>
      <p class="text-sm opacity-90 mt-1">Business Operations System</p>
    </div>

    <form id="login-form" class="p-6 space-y-4">
      <div id="error-message" class="hidden p-3 bg-red-100 text-error rounded-xl text-sm flex items-center gap-2">
        <span class="material-symbols-outlined text-base">error</span>
        <span class="message-text">Invalid credentials</span>
      </div>
      <div class="space-y-1">
        <label for="email" class="text-xs font-semibold uppercase text-on-surface-variant tracking-wider">Email Address</label>
        <input id="email" type="email" required class="w-full bg-surface border border-outline-variant rounded-xl px-4 py-2.5 text-sm focus:border-primary focus:ring-1 focus:ring-primary outline-none" placeholder="name@edenrecyclers.com">
      </div>
      <div class="space-y-1">
        <div class="flex justify-between items-center">
          <label for="password" class="text-xs font-semibold uppercase text-on-surface-variant tracking-wider">Password</label>
          <a href="#" id="forgot-password" class="text-xs font-bold text-primary hover:underline">Forgot?</a>
        </div>
        <input id="password" type="password" required class="w-full bg-surface border border-outline-variant rounded-xl px-4 py-2.5 text-sm focus:border-primary focus:ring-1 focus:ring-primary outline-none" placeholder="password">
      </div>
      <button id="submit-btn" type="submit" class="w-full bg-primary text-on-primary font-bold py-3 rounded-xl shadow-md hover:opacity-90 active:scale-95 transition-all flex items-center justify-center gap-2">
        <span>Sign In</span>
        <span class="material-symbols-outlined text-sm">login</span>
      </button>
    </form>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js?v=20260531-hardening1"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/state.js"></script>
  <script src="js/auth.js?v=20260531-hardening1"></script>
  <script>
    async function clearLocalDevCaches() {
      const isLocal = ['127.0.0.1', 'localhost'].includes(window.location.hostname);
      if (!isLocal) return;
      try {
        if ('serviceWorker' in navigator) {
          const regs = await navigator.serviceWorker.getRegistrations();
          await Promise.all(regs.map(reg => reg.unregister()));
        }
        if ('caches' in window) {
          const keys = await caches.keys();
          await Promise.all(keys.map(key => caches.delete(key)));
        }
      } catch (err) {
        console.warn('Local cache cleanup failed:', err);
      }
    }

    document.addEventListener('DOMContentLoaded', async () => {
      const loginForm = document.getElementById('login-form');
      const emailInput = document.getElementById('email');
      const passwordInput = document.getElementById('password');
      const errorMessage = document.getElementById('error-message');
      const msgText = errorMessage.querySelector('.message-text');
      const forgotPasswordLink = document.getElementById('forgot-password');

      if (window.supabaseClient && !window.authManager.isMockMode()) {
        const { data: { session } } = await window.supabaseClient.auth.getSession();
        if (session) {
          const role = localStorage.getItem('eden_user_role') || 'manager';
          window.location.href = window.authManager.getRedirectPage(role);
          return;
        }
      }

      loginForm.addEventListener('submit', async event => {
        event.preventDefault();
        errorMessage.classList.add('hidden');
        const email = emailInput.value.trim();
        const password = passwordInput.value;
        if (!email || !password) {
          msgText.innerText = 'Please enter both email and password.';
          errorMessage.classList.remove('hidden');
          return;
        }

        const btn = document.getElementById('submit-btn');
        btn.disabled = true;
        btn.classList.add('opacity-70');
        btn.innerHTML = 'Signing In...';

        const success = await window.authManager.login(email, password);
        if (success) {
          await clearLocalDevCaches();
          const role = localStorage.getItem('eden_user_role') || 'manager';
          window.location.href = window.authManager.getRedirectPage(role) + '?fresh=' + Date.now();
          return;
        }

        msgText.innerText = 'Invalid email or password.';
        errorMessage.classList.remove('hidden');
        btn.disabled = false;
        btn.classList.remove('opacity-70');
        btn.innerHTML = '<span>Sign In</span><span class="material-symbols-outlined text-sm">login</span>';
      });

      forgotPasswordLink.addEventListener('click', async event => {
        event.preventDefault();
        const email = emailInput.value.trim();
        if (!email) {
          msgText.innerText = 'Enter your email address first.';
          errorMessage.classList.remove('hidden');
          return;
        }
        const success = await window.authManager.forgotPassword(email);
        msgText.innerText = success ? 'Password reset link sent.' : 'Failed to send reset link.';
        errorMessage.classList.remove('hidden');
      });
    });
  </script>
</body>
</html>
